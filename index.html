<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>To Do App List</title>
</head>
<body>
    <div class="contanier">
        <h3>To Do App List</h3>
        <input type="text" id="inp1" placeholder="Enter the task name">
        <input type="time" id="inp2" placeholder="Enter the task duration">
        <input type="text" id="inp3" placeholder="Enter task priority">
        <button id="btn">Add task</button>
        <h3 id="h3"></h3>
        <button id="DeleteAll" class="delete">Delete All</button>
        <div id="tasks-container"></div>
    </div>
    <script src="main.js"></script>
</body>
</html>
